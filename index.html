<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapeworm - Audition Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }
        
        h1 {
            font-size: 3.5em;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .tagline {
            font-size: 1.2em;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 107, 107, 0.3);
            transform: translateY(-5px);
        }
        
        .card h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #b0b0b0;
            font-weight: 500;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6b6b;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff6b6b;
        }
        
        .preview-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .background-option {
            aspect-ratio: 16/9;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .background-option:hover {
            border-color: #ff6b6b;
            transform: scale(1.05);
        }
        
        .background-option.active {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }
        
        .bg-dark-grey { background: #3a3a3a; }
        .bg-black { background: #0a0a0a; }
        .bg-white { background: #f5f5f5; }
        .bg-blue { background: #1e40af; }
        .bg-wood { background: linear-gradient(45deg, #8b6914, #a0826d); }
        
        .lines-container {
            margin-top: 30px;
        }
        
        .line-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #ff6b6b;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .line-text {
            flex: 1;
        }
        
        .character-name {
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 5px;
        }
        
        .line-content {
            color: #b0b0b0;
            font-size: 0.95em;
        }
        
        .remove-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }
        
        .remove-btn:hover {
            background: #ff6b6b;
            color: white;
        }
        
        .video-preview {
            margin-top: 30px;
            position: relative;
        }
        
        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.2em;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }
        
        .video-box.active {
            background: rgba(0, 0, 0, 0.8);
            border-color: #ff6b6b;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #ff6b6b;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #a0a0a0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .main-content { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪱 Tapeworm</h1>
            <p class="tagline">Your parasitic audition assistant — feeds on your success</p>
        </header>
        
        <div class="main-content">
            <!-- Script Upload Section -->
            <div class="card">
                <h2>📝 Your Script</h2>
                
                <div class="input-group">
                    <label>Character Name</label>
                    <input type="text" id="characterName" placeholder="e.g., Detective Sarah">
                </div>
                
                <div class="input-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" placeholder="e.g., The Chosen, SEAL Team">
                </div>
                
                <div class="input-group">
                    <label>Paste Your Lines</label>
                    <textarea id="scriptLines" placeholder="Paste your audition lines here..."></textarea>
                </div>
                
                <button class="btn-primary" onclick="addLine()">+ Add Line</button>
            </div>
            
            <!-- Background & Settings -->
            <div class="card">
                <h2>🎨 Set Your Scene</h2>
                
                <label style="margin-bottom: 15px;">Background</label>
                <div class="preview-grid">
                    <div class="background-option bg-dark-grey active" onclick="selectBg(this, 'dark-grey')" title="Dark Grey"></div>
                    <div class="background-option bg-black" onclick="selectBg(this, 'black')" title="Black"></div>
                    <div class="background-option bg-white" onclick="selectBg(this, 'white')" title="White"></div>
                    <div class="background-option bg-blue" onclick="selectBg(this, 'blue')" title="Blue"></div>
                    <div class="background-option bg-wood" onclick="selectBg(this, 'wood')" title="Wood"></div>
                </div>
                
                <div class="input-group" style="margin-top: 25px;">
                    <label>Lighting Adjustment</label>
                    <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1" onchange="adjustLighting()">
                    <small style="color: #666; display: block; margin-top: 5px;">Drag to adjust brightness</small>
                </div>
            </div>
        </div>
        
        <!-- Lines Management -->
        <div class="card">
            <h2>📖 Your Lines</h2>
            <div id="linesList" class="lines-container">
                <p style="color: #666; text-align: center; padding: 40px 0;">Add your first line above →</p>
            </div>
        </div>
        
        <!-- Video Preview -->
        <div class="card">
            <h2>🎬 Recording Preview</h2>
            <div class="video-box" id="videoPreview">
                📹 Hit "Start Recording" to see your audition here
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="lineCount">0</div>
                    <div class="stat-label">Lines Loaded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="charCount">0</div>
                    <div class="stat-label">Characters</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="timeEstimate">0m</div>
                    <div class="stat-label">Estimated Time</div>
                </div>
            </div>
            
            <div class="button-group" style="margin-top: 30px;">
                <button class="btn-primary" onclick="startRecording()">🎥 Start Recording</button>
                <button class="btn-secondary" onclick="resetAudition()">↻ Reset</button>
            </div>
        </div>
    </div>
    
    <script>
        let lines = [];
        let selectedBg = 'dark-grey';
        
        function addLine() {
            const character = document.getElementById('characterName').value.trim();
            const project = document.getElementById('projectName').value.trim();
            const script = document.getElementById('scriptLines').value.trim();
            
            if (!character || !script) {
                alert('Please enter character name and lines');
                return;
            }
            
            lines.push({
                character: character,
                project: project,
                text: script,
                id: Date.now()
            });
            
            document.getElementById('characterName').value = '';
            document.getElementById('projectName').value = '';
            document.getElementById('scriptLines').value = '';
            
            renderLines();
            updateStats();
        }
        
        function renderLines() {
            const container = document.getElementById('linesList');
            
            if (lines.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 40px 0;">No lines added yet</p>';
                return;
            }
            
            container.innerHTML = lines.map(line => `
                <div class="line-item">
                    <div class="line-text">
                        <div class="character-name">${line.character}${line.project ? ` (${line.project})` : ''}</div>
                        <div class="line-content">"${line.text}"</div>
                    </div>
                    <button class="remove-btn" onclick="removeLine(${line.id})">✕</button>
                </div>
            `).join('');
        }
        
        function removeLine(id) {
            lines = lines.filter(l => l.id !== id);
            renderLines();
            updateStats();
        }
        
        function selectBg(el, bg) {
            document.querySelectorAll('.background-option').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            selectedBg = bg;
            updateVideoPreview();
        }
        
        function adjustLighting() {
            updateVideoPreview();
        }
        
        function updateVideoPreview() {
            const preview = document.getElementById('videoPreview');
            const brightness = document.getElementById('brightness').value;
            
            let bgColor = '#3a3a3a';
            if (selectedBg === 'black') bgColor = '#0a0a0a';
            if (selectedBg === 'white') bgColor = '#f5f5f5';
            if (selectedBg === 'blue') bgColor = '#1e40af';
            if (selectedBg === 'wood') bgColor = 'linear-gradient(45deg, #8b6914, #a0826d)';
            
            preview.style.background = bgColor;
            preview.style.filter = `brightness(${brightness})`;
        }
        
        function updateStats() {
            document.getElementById('lineCount').textContent = lines.length;
            
            const charCount = lines.reduce((sum, l) => sum + l.character.length, 0);
            document.getElementById('charCount').textContent = charCount;
            
            const totalChars = lines.reduce((sum, l) => sum + l.text.length, 0);
            const estimatedSeconds = Math.ceil(totalChars / 15);
            const minutes = Math.floor(estimatedSeconds / 60);
            document.getElementById('timeEstimate').textContent = minutes > 0 ? `${minutes}m` : '<1m';
        }
        
        function startRecording() {
            if (lines.length === 0) {
                alert('Add your lines first!');
                return;
            }
            
            alert(`🎬 Ready to record!\n\n${lines.length} line(s) loaded\n\nIn a real app, this would start your camera. For now, practice with your lines!`);
        }
        
        function resetAudition() {
            lines = [];
            document.getElementById('characterName').value = '';
            document.getElementById('projectName').value = '';
            document.getElementById('scriptLines').value = '';
            selectedBg = 'dark-grey';
            document.querySelectorAll('.background-option').forEach(e => e.classList.remove('active'));
            document.querySelector('.bg-dark-grey').classList.add('active');
            document.getElementById('brightness').value = 1;
            renderLines();
            updateStats();
            updateVideoPreview();
        }
        
        // Initialize
        updateVideoPreview();
    </script>
</body>
</html>
