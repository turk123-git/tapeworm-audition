<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapeworm Audition Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .section {
            display: flex;
            flex-direction: column;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
        }
        
        .section label {
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .section input,
        .section textarea,
        .section select {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            margin-bottom: 15px;
            font-family: 'Arial', sans-serif;
            transition: border-color 0.3s;
        }
        
        .section input:focus,
        .section textarea:focus,
        .section select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .section textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .background-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .bg-option {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .bg-option:hover {
            transform: scale(1.1);
        }
        
        .bg-option.selected {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
        
        .bg-dark-grey {
            background-color: #3a3a3a;
        }
        
        .bg-black {
            background-color: #000000;
        }
        
        .bg-white {
            background-color: #ffffff;
            border: 2px solid #ccc;
        }
        
        .bg-blue {
            background-color: #1e40af;
        }
        
        .bg-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .preview-section {
            grid-column: 1 / -1;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .preview-section h2 {
            margin-bottom: 20px;
        }
        
        .preview-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            background: #ccc;
        }
        
        .preview-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .preview-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
        }
        
        .preview-character {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .preview-line {
            font-size: 1.2em;
            max-width: 90%;
            word-wrap: break-word;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .lighting-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .lighting-controls label {
            margin-bottom: 0;
        }
        
        .lighting-controls input[type="range"] {
            margin-bottom: 0;
            width: 150px;
        }
        
        .brightness-value {
            color: #666;
            font-weight: bold;
            min-width: 50px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🪱 Tapeworm</h1>
            <p>Audition Assistant for Actors</p>
        </div>
        
        <div class="main-content">
            <div class="section">
                <h2>Your Script</h2>
                <label>Character Name</label>
                <input type="text" id="characterName" placeholder="e.g., Sarah Johnson">
                
                <label>Your Lines</label>
                <textarea id="scriptLines" placeholder="Paste your audition lines here..."></textarea>
            </div>
            
            <div class="section">
                <h2>Scene Setup</h2>
                <label>Select Background</label>
                <div class="background-options">
                    <div class="bg-option bg-dark-grey selected" data-bg="bg-dark-grey" title="Dark Grey"></div>
                    <div class="bg-option bg-black" data-bg="bg-black" title="Black"></div>
                    <div class="bg-option bg-white" data-bg="bg-white" title="White"></div>
                    <div class="bg-option bg-blue" data-bg="bg-blue" title="Blue"></div>
                    <div class="bg-option bg-gradient" data-bg="bg-gradient" title="Gradient"></div>
                </div>
                
                <label>Lighting</label>
                <div class="lighting-controls">
                    <label>Brightness:</label>
                    <input type="range" id="brightness" min="50" max="150" value="100">
                    <span class="brightness-value" id="brightnessValue">100%</span>
                </div>
                
                <label>Contrast:</label>
                <div class="lighting-controls">
                    <input type="range" id="contrast" min="80" max="150" value="100">
                    <span class="brightness-value" id="contrastValue">100%</span>
                </div>
            </div>
            
            <div class="preview-section">
                <h2>Live Preview</h2>
                <div class="preview-container">
                    <div class="preview-bg bg-dark-grey" id="previewBg" style="filter: brightness(100%) contrast(100%);"></div>
                    <div class="preview-content" id="previewContent">
                        <div class="preview-character" id="previewCharacter">Your Character</div>
                        <div class="preview-line" id="previewLine">"Your lines appear here"</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-primary" onclick="recordAudition()">🎥 Start Recording</button>
                    <button class="btn-secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Background selection
        document.querySelectorAll('.bg-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.bg-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                
                const bgClass = this.dataset.bg;
                const previewBg = document.getElementById('previewBg');
                previewBg.className = 'preview-bg ' + bgClass;
            });
        });
        
        // Character name input
        document.getElementById('characterName').addEventListener('input', function() {
            document.getElementById('previewCharacter').textContent = this.value || 'Your Character';
        });
        
        // Script lines input
        document.getElementById('scriptLines').addEventListener('input', function() {
            const lines = this.value.split('\n').filter(line => line.trim());
            const displayLine = lines[0] || 'Your lines appear here';
            document.getElementById('previewLine').textContent = '"' + displayLine + '"';
        });
        
        // Brightness control
        document.getElementById('brightness').addEventListener('input', function() {
            document.getElementById('brightnessValue').textContent = this.value + '%';
            updateFilters();
        });
        
        // Contrast control
        document.getElementById('contrast').addEventListener('input', function() {
            document.getElementById('contrastValue').textContent = this.value + '%';
            updateFilters();
        });
        
        function updateFilters() {
            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;
            const previewBg = document.getElementById('previewBg');
            previewBg.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
        }
        
        function recordAudition() {
            const characterName = document.getElementById('characterName').value || 'Unknown Character';
            const lines = document.getElementById('scriptLines').value || 'No lines provided';
            
            alert('🎬 Recording started!\n\nCharacter: ' + characterName + '\n\nLook at the camera and deliver your lines. When done, the recording will be saved.');
            
            // In a real app, this would trigger actual video recording
            console.log('Recording:', { characterName, lines });
        }
        
        function clearAll() {
            document.getElementById('characterName').value = '';
            document.getElementById('scriptLines').value = '';
            document.getElementById('brightness').value = '100';
            document.getElementById('contrast').value = '100';
            document.getElementById('previewCharacter').textContent = 'Your Character';
            document.getElementById('previewLine').textContent = '"Your lines appear here"';
            document.getElementById('brightnessValue').textContent = '100%';
            document.getElementById('contrastValue').textContent = '100%';
            updateFilters();
        }
    </script>
</body>
</html>
