<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapeworm - Audition Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            gap: 0;
        }

        .preview-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .bg-color {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .preview-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .preview-content h3 {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .preview-content p {
            font-size: 14px;
            opacity: 0.6;
            line-height: 1.5;
        }

        .form-section {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }

        .form-section p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .bg-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .bg-button {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .bg-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .bg-button.active {
            border: 3px solid #667eea;
        }

        .bg-dark-grey {
            background: #424242;
            color: white;
        }

        .bg-black {
            background: #1a1a1a;
            color: white;
        }

        .bg-white {
            background: #ffffff;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .bg-blue {
            background: #2196F3;
            color: white;
        }

        .bg-wood {
            background: linear-gradient(135deg, #8B6914 0%, #5a4009 100%);
            color: white;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-record {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-record:hover {
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .preview-section {
                padding: 20px;
            }

            .form-section {
                padding: 20px;
            }

            .form-section h1 {
                font-size: 24px;
            }
        }

        .lighting-controls {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .slider-group {
            margin-bottom: 15px;
        }

        .slider-group label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .value-display {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Preview Section -->
        <div class="preview-section">
            <div class="preview-box">
                <div class="bg-color" id="bgColor"></div>
                <div class="preview-content">
                    <h3 id="characterDisplay">Character Name</h3>
                    <p id="lineDisplay">Your audition line will appear here...</p>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <h1>Tapeworm</h1>
            <p>Prepare your audition with confidence</p>

            <div class="form-group">
                <label for="characterName">Character Name *</label>
                <input type="text" id="characterName" placeholder="e.g., John Doe" required>
            </div>

            <div class="form-group">
                <label for="scriptLine">Script Line *</label>
                <textarea id="scriptLine" placeholder="Paste your audition line here..." required></textarea>
            </div>

            <div class="form-group">
                <label>Background Color *</label>
                <div class="bg-buttons">
                    <button class="bg-button bg-dark-grey" onclick="setBackground('#424242')">Dark Grey</button>
                    <button class="bg-button bg-black" onclick="setBackground('#1a1a1a')">Black</button>
                    <button class="bg-button bg-white" onclick="setBackground('#ffffff')">White</button>
                    <button class="bg-button bg-blue" onclick="setBackground('#2196F3')">Blue</button>
                    <button class="bg-button bg-wood" onclick="setBackground('linear-gradient(135deg, #8B6914 0%, #5a4009 100%)')">Wood</button>
                </div>
            </div>

            <div class="form-group">
                <label>Lighting & Adjustments</label>
                <div class="lighting-controls">
                    <div class="slider-group">
                        <label for="brightness">Brightness: <span class="value-display" id="brightnessValue">100%</span></label>
                        <input type="range" id="brightness" min="50" max="150" value="100" onchange="updateLighting()">
                    </div>
                    <div class="slider-group">
                        <label for="contrast">Contrast: <span class="value-display" id="contrastValue">100%</span></label>
                        <input type="range" id="contrast" min="50" max="150" value="100" onchange="updateLighting()">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn-clear" onclick="clearForm()">Clear</button>
                <button class="btn-download" onclick="downloadSetup()">Save</button>
                <button class="btn-record" onclick="startRecording()">🎥 Record Audition</button>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let selectedBgColor = '#424242';

        function updatePreview() {
            const charName = document.getElementById('characterName').value || 'Character Name';
            const line = document.getElementById('scriptLine').value || 'Your audition line will appear here...';
            
            document.getElementById('characterDisplay').textContent = charName;
            document.getElementById('lineDisplay').textContent = line;
        }

        function setBackground(color) {
            selectedBgColor = color;
            document.getElementById('bgColor').style.background = color;
            
            // Update button states
            document.querySelectorAll('.bg-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function updateLighting() {
            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;
            
            document.getElementById('brightnessValue').textContent = brightness + '%';
            document.getElementById('contrastValue').textContent = contrast + '%';
            
            const bgColor = document.getElementById('bgColor');
            bgColor.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
        }

        function clearForm() {
            document.getElementById('characterName').value = '';
            document.getElementById('scriptLine').value = '';
            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            selectedBgColor = '#424242';
            document.getElementById('bgColor').style.background = selectedBgColor;
            document.getElementById('bgColor').style.filter = 'none';
            updatePreview();
        }

        function downloadSetup() {
            const charName = document.getElementById('characterName').value;
            const line = document.getElementById('scriptLine').value;
            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;

            if (!charName || !line) {
                alert('Please fill in character name and script line');
                return;
            }

            const setup = {
                character: charName,
                line: line,
                backgroundColor: selectedBgColor,
                brightness: brightness,
                contrast: contrast,
                timestamp: new Date().toLocaleString()
            };

            const dataStr = JSON.stringify(setup, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `${charName.replace(/\s+/g, '_')}_audition_setup.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        async function startRecording() {
            try {
                const canvas = document.querySelector('.preview-box');
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { mediaSource: 'screen' },
                    audio: true
                });

                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${document.getElementById('characterName').value || 'audition'}_${Date.now()}.webm`;
                    a.click();
                };

                mediaRecorder.start();
                alert('Recording started! Click OK to stop recording.');
                
                stream.getTracks().forEach(track => {
                    track.onended = () => {
                        mediaRecorder.stop();
                    };
                });

            } catch (err) {
                console.error('Error accessing media:', err);
                alert('Unable to start recording. Please check your permissions.');
            }
        }

        // Update preview on input change
        document.getElementById('characterName').addEventListener('input', updatePreview);
        document.getElementById('scriptLine').addEventListener('input', updatePreview);

        // Set initial background
        setBackground('#424242');
        updatePreview();
    </script>
</body>
</html>
